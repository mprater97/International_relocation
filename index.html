<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<title>🇬🇧→🇦🇺 Relocation Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
[data-theme="dark"]{--bg:#0f172a;--card:#1e293b;--card2:#334155;--accent:#3b82f6;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--orange:#f97316;--text:#f1f5f9;--muted:#94a3b8;--border:#475569}
[data-theme="light"]{--bg:#f1f5f9;--card:#fff;--card2:#e2e8f0;--accent:#2563eb;--green:#16a34a;--yellow:#ca8a04;--red:#dc2626;--orange:#ea580c;--text:#1e293b;--muted:#64748b;--border:#cbd5e1}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;font-size:14px}
.container{max-width:1100px;margin:0 auto;padding:12px}
header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px}
h1{font-size:1.3rem}
.subtitle{color:var(--muted);font-size:.8rem}
.hdr-btns{display:flex;gap:4px}
.tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-size:.82rem;transition:.15s;user-select:none}
.tab:hover{background:var(--card2)}.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.panel{display:none}.panel.active{display:block}
.card{background:var(--card);border-radius:10px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.card h2{font-size:1rem;margin-bottom:8px}
.card h3{font-size:.88rem;margin:12px 0 6px;color:var(--muted)}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.sb{background:var(--card);border-radius:8px;padding:12px;border:1px solid var(--border);text-align:center}
.sb .l{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.sb .v{font-size:1.3rem;font-weight:700;margin-top:2px}
.green .v{color:var(--green)}.yellow .v{color:var(--yellow)}.red .v{color:var(--red)}.blue .v{color:var(--accent)}.orange .v{color:var(--orange)}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{text-align:left;padding:6px 8px;background:var(--card2);color:var(--muted);font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px}
td{padding:6px 8px;border-bottom:1px solid var(--border)}
input[type="number"],input[type="text"],input[type="date"],select,textarea{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:5px 7px;border-radius:6px;width:100%;font-size:.82rem;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:50px}
.ism{width:90px;min-width:60px}
table input[type="text"]{font-size:13px!important;min-height:40px}
table input[type="number"]{font-size:13px!important}
table select{font-size:13px!important}
@media(max-width:820px){table{min-width:auto}table input[type="text"]{min-width:100px!important}.ism{width:70px;min-width:50px}}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:.65rem;font-weight:600}
.b-pend{background:rgba(234,179,8,.15);color:var(--yellow)}
.b-paid{background:rgba(34,197,94,.15);color:var(--green)}
.b-over{background:rgba(239,68,68,.15);color:var(--red)}
.b-co{background:rgba(59,130,246,.15);color:var(--accent)}
.b-keep{background:rgba(234,179,8,.15);color:var(--yellow)}
.b-cancel{background:rgba(34,197,94,.15);color:var(--green)}
.b-clear{background:rgba(239,68,68,.15);color:var(--red)}
.b-stops{background:rgba(34,197,94,.15);color:var(--green)}
.pb{height:8px;background:var(--card2);border-radius:4px;overflow:hidden}
.pf{height:100%;border-radius:4px;transition:width .3s}
.ci{display:flex;align-items:flex-start;gap:8px;padding:8px;border-bottom:1px solid var(--border)}
.ci:hover{background:rgba(255,255,255,.02)}
.ci.done{opacity:.4}.ci.done .ct{text-decoration:line-through}
.ci input[type="checkbox"]{width:17px;height:17px;margin-top:2px;accent-color:var(--accent);flex-shrink:0}
.ct{flex:1}.cm{font-size:.7rem;color:var(--muted);margin-top:1px}
.cc{font-size:.75rem;color:var(--orange);white-space:nowrap}
.pl{font-size:.65rem;padding:2px 6px;border-radius:8px;font-weight:600;margin-right:3px}
.p1{background:rgba(59,130,246,.15);color:#60a5fa}
.p2{background:rgba(249,115,22,.15);color:var(--orange)}
.p3{background:rgba(234,179,8,.15);color:var(--yellow)}
.p4{background:rgba(34,197,94,.15);color:var(--green)}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:8px}
.cc-card{background:var(--card2);border-radius:8px;padding:10px}
.cc-card .n{font-weight:600;font-size:.85rem;margin-bottom:2px}
.cc-card input{margin-top:2px}
.btn{padding:6px 12px;border-radius:6px;border:none;cursor:pointer;font-size:.8rem;font-weight:600;transition:.15s}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{opacity:.85}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-o:hover{background:var(--card2)}
.btn-i{background:transparent;border:1px solid var(--border);color:var(--text);width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;font-size:.9rem}
.btn-i:hover{background:var(--card2)}
.flex{display:flex}.g2{gap:8px}.aic{align-items:center}.jcb{justify-content:space-between}.fw{flex-wrap:wrap}
.mt2{margin-top:8px}.mt3{margin-top:12px}.mb2{margin-bottom:8px}
.ts{font-size:.82rem}.tx{font-size:.72rem}.tm{color:var(--muted)}
.tg{color:var(--green)}.tr{color:var(--red)}
/* Sub-tabs */
.stabs{display:flex;gap:3px;margin-bottom:10px;flex-wrap:wrap}
.stab{padding:5px 12px;background:var(--card2);border-radius:6px;color:var(--muted);cursor:pointer;font-size:.78rem}
.stab.active{background:var(--accent);color:#fff}
.sub{display:none}.sub.active{display:block}
/* Touch-friendly sizing */
input,select,textarea,button{font-size:16px!important;min-height:44px}
.btn,.btn-p,.btn-o{min-height:44px;min-width:44px}
.btn-i{min-width:44px;min-height:44px}
.ci input[type="checkbox"]{width:22px;height:22px;min-height:22px}
.tab,.stab{min-height:44px;display:flex;align-items:center;justify-content:center}
/* Scrollable tables */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -4px;padding:0 4px}
table{min-width:500px}
/* Tabs scroll */
.tabs,.stabs{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;scrollbar-width:none;-ms-overflow-style:none}
.tabs::-webkit-scrollbar,.stabs::-webkit-scrollbar{display:none}
.tab,.stab{white-space:nowrap;flex-shrink:0}
/* Safe areas */
.container{padding:12px;padding:12px env(safe-area-inset-right) 12px env(safe-area-inset-left)}
/* iPad portrait */
@media(max-width:820px){
  .sg{grid-template-columns:repeat(2,1fr)}
  .container{padding:10px}
  .cg{grid-template-columns:1fr}
  #mapView{height:400px}
  h1{font-size:1.1rem}
}
/* iPad landscape */
@media(min-width:821px) and (max-width:1180px){
  .sg{grid-template-columns:repeat(3,1fr)}
  #mapView{height:500px}
}
/* Phone */
@media(max-width:480px){
  .sg{grid-template-columns:repeat(2,1fr)}
  .container{padding:8px}
  #mapView{height:350px}
  .card{padding:12px}
}
#mapView{height:60vh;touch-action:none;min-height:350px;max-height:600px;border-radius:10px;z-index:1}
.pin-form{background:var(--card);border-radius:10px;padding:12px;margin-top:10px;border:1px solid var(--border)}
.pin-cat{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:4px}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
ul{margin:6px 0 6px 20px}ul li{margin-bottom:2px}
</style>
</head>
<body>
<div id="loginOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 40%,#0f172a 100%);z-index:9999;display:flex;align-items:center;justify-content:center;overflow:hidden">
  <div style="position:absolute;top:0;left:0;width:100%;height:100%;opacity:.06;background:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🌏</text></svg>') center/300px repeat"></div>
  <div style="position:relative;text-align:center;max-width:440px;width:90%;padding:20px">
    <div style="font-size:4rem;margin-bottom:10px;filter:drop-shadow(0 4px 20px rgba(59,130,246,.3))">
      <span style="display:inline-block;animation:float 3s ease-in-out infinite">✈️</span>
    </div>
    <h1 style="font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px">The Prater-Cockaynes</h1>
    <p style="font-size:1.1rem;color:#94a3b8;margin-bottom:6px">UK → Melbourne, Australia</p>
    <div style="display:flex;justify-content:center;gap:20px;margin:16px 0">
      <div style="text-align:center"><div style="font-size:1.8rem">🇬🇧</div><div style="font-size:.7rem;color:#64748b;margin-top:2px">Home</div></div>
      <div style="text-align:center;color:#3b82f6;font-size:1.5rem;line-height:2.2">· · · · ·</div>
      <div style="text-align:center"><div style="font-size:1.8rem">🇦🇺</div><div style="font-size:.7rem;color:#64748b;margin-top:2px">New Home</div></div>
    </div>
    <div style="background:rgba(255,255,255,.05);border-radius:16px;padding:24px;margin:16px 0;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08)">
      <div id="loginQuote" style="font-size:.95rem;color:#e2e8f0;font-style:italic;margin-bottom:16px;line-height:1.6"></div>
      <form id="loginForm" onsubmit="checkLogin();return false;" autocomplete="on">
      <input type="hidden" name="username" value="prater" autocomplete="username">
      <input type="password" id="loginPw" name="password" autocomplete="current-password" placeholder="Enter password" style="text-align:center;padding:12px;font-size:1rem;margin-bottom:10px;border-radius:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#f1f5f9;width:100%">
      <br><button type="submit" class="btn btn-p" style="width:100%;padding:12px;font-size:1rem;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#22c55e)">🔓 Let's Go</button>
      </form>
      <label style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;font-size:.82rem;color:#94a3b8;cursor:pointer"><input type="checkbox" id="trustDevice" style="width:18px;height:18px;min-height:18px"> Trust this device (stay logged in)</label>
      <p id="loginErr" style="color:#ef4444;font-size:.8rem;margin-top:8px;display:none">Wrong password — try again</p>
    </div>
    <p style="font-size:.7rem;color:#475569">Family Relocation Tracker · 2026</p>
  </div>
</div>
<style>
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

<div class="container" id="appContainer" style="display:none">
<header>
  <div><h1>🇬🇧→🇦🇺 Relocation Tracker</h1><p class="subtitle" id="headerDates"></p></div>
  <div class="hdr-btns"><span id="saveIndicator" style="font-size:.72rem;color:var(--muted);margin-right:4px">—</span>
    <button class="btn-i" onclick="syncFromCloud()" title="Sync from cloud">🔄</button>

<script>
var QUOTES=[
  '"Adventure is worthwhile." — Aesop',
  '"The world is a book, and those who do not travel read only one page." — St. Augustine',
  '"Life begins at the end of your comfort zone." — Neale Donald Walsch',
  '"Not all those who wander are lost." — J.R.R. Tolkien',
  '"Melbourne is calling... and you must go." 🌏',
  '"New city. New chapter. Same amazing family." ❤️',
  '"The biggest adventure you can take is to live the life of your dreams." — Oprah',
  '"Every journey of a thousand miles begins with a single step." 🦘',
  '"G\'day mate — your new life is waiting!" 🇦🇺',
  '"This time next year, you\'ll be glad you started today."',
  '"Home is not a place, it\'s the people you\'re with." 👨‍👩‍👧‍👦',
  '"Melbourne: World\'s most liveable city. Soon to be YOUR city." ☀️',
];
document.getElementById('loginQuote').textContent=QUOTES[Math.floor(Math.random()*QUOTES.length)];

function syncFromCloud(){
  var el=document.getElementById('saveIndicator');
  if(el){el.textContent='🔄 Pulling from cloud...';el.style.color='var(--orange)'}
  if(!window._fbReady){if(el){el.textContent='⚠️ Firebase not ready - wait a moment and try again';el.style.color='var(--red)'}return}
  window._fbLoad().then(function(snap){
    if(snap.exists){
      var cloud=snap.data();
      // Always use cloud data when manually syncing
      if(cloud._deleted){if(el){el.textContent='Cloud is empty - start fresh';el.style.color='var(--muted)'}return}
      localStorage.setItem('relo_v3',JSON.stringify(cloud));
      if(el){el.textContent='☁️ Got cloud data - reloading...';el.style.color='var(--accent)'}
      setTimeout(function(){location.reload()},500);
    }else{
      if(el){el.textContent='No cloud data yet - save something first on another device';el.style.color='var(--muted)'}
    }
  }).catch(function(e){
    if(el){el.textContent='⚠️ Sync failed: '+e.message;el.style.color='var(--red)'}
    console.log('Sync error:',e);
  });
}

function logout(){
  sessionStorage.removeItem('relo_unlocked');
  localStorage.removeItem('relo_trusted');
  document.getElementById('loginOverlay').style.display='flex';
  document.getElementById('appContainer').style.display='none';
  document.getElementById('loginPw').value='';
  document.getElementById('loginErr').style.display='none';
}

function checkLogin(){
  var pw=document.getElementById('loginPw').value;
  var hash=0;for(var i=0;i<pw.length;i++){hash=((hash<<5)-hash)+pw.charCodeAt(i);hash|=0}
  var stored=localStorage.getItem('relo_pw_hash');
  if(!stored){localStorage.setItem('relo_pw_hash',String(hash));unlock(true)}
  else if(String(hash)===stored){unlock(true)}
  else{document.getElementById('loginErr').style.display='block'}
}
function unlock(fromLogin){
  document.getElementById('loginOverlay').style.display='none';
  document.getElementById('appContainer').style.display='block';
  sessionStorage.setItem('relo_unlocked','1');
  if(fromLogin&&document.getElementById('trustDevice')&&document.getElementById('trustDevice').checked){
    localStorage.setItem('relo_trusted','1');
  }
}
// Auto-unlock trusted devices or active sessions
if(sessionStorage.getItem('relo_unlocked')==='1'||localStorage.getItem('relo_trusted')==='1'){unlock(false)}
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var _fbProject='international-travel-prater-co';
var _fbDatabase='travel-tracker';
var _fbApiKey='AIzaSyCkKC4fUOBNqnXghQNUGTHe4lZ06gIILIY';
var _fbBase='https://firestore.googleapis.com/v1/projects/'+_fbProject+'/databases/'+_fbDatabase+'/documents';

window._fbReady=true;

window._fbSave=function(data){
  var url=_fbBase+'/tracker/state?key='+_fbApiKey;
  var fields={};
  Object.keys(data).forEach(function(k){
    var v=data[k];
    if(typeof v==='string')fields[k]={stringValue:v};
    else if(typeof v==='number')fields[k]={integerValue:String(Math.round(v))};
    else if(typeof v==='boolean')fields[k]={booleanValue:v};
    else if(v===null)fields[k]={nullValue:null};
    else fields[k]={stringValue:JSON.stringify(v)};
  });
  return fetch(url,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:{data:{stringValue:JSON.stringify(data)}}})}).then(function(r){if(!r.ok)throw new Error('Save failed: '+r.status);return r.json()});
};

window._fbLoad=function(){
  var url=_fbBase+'/tracker/state?key='+_fbApiKey;
  return fetch(url).then(function(r){
    if(r.status===404)return{exists:false};
    if(!r.ok)throw new Error('Load failed: '+r.status);
    return r.json().then(function(doc){
      var raw=doc.fields&&doc.fields.data&&doc.fields.data.stringValue;
      if(raw){return{exists:true,data:function(){return JSON.parse(raw)}}}
      return{exists:false};
    });
  });
};

// Load from cloud on startup
window._fbLoad().then(function(snap){
  if(snap.exists){
    var cloud=snap.data();
    var local=JSON.parse(localStorage.getItem('relo_v3')||'{}');
    if(cloud._saved&&!cloud._deleted&&(!local._saved||cloud._saved>local._saved)){
      localStorage.setItem('relo_v3',JSON.stringify(cloud));
      location.reload();
    }
  }
}).catch(function(e){console.log('Firebase load:',e)});
</script>
