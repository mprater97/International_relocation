<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>☀️ Melbourne Weather — Family Guide</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(180deg,#0c1929 0%,#1a2744 100%);color:#e2e8f0;padding:16px;min-height:100vh}
.container{max-width:900px;margin:0 auto}
h1{font-size:1.6rem;text-align:center;margin-bottom:4px}
.tagline{text-align:center;color:#94a3b8;font-size:.85rem;margin-bottom:20px}
.hero{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:24px}
.hero-card{background:rgba(255,255,255,.06);backdrop-filter:blur(10px);border-radius:14px;padding:14px 10px;text-align:center;border:1px solid rgba(255,255,255,.08)}
.hero-card .emoji{font-size:1.8rem;margin-bottom:4px}
.hero-card .val{font-size:1.4rem;font-weight:800}
.hero-card .lbl{font-size:.65rem;color:#94a3b8;margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.section{margin-bottom:28px}
.section-title{font-size:1.1rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.seasons{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.season-card{border-radius:14px;padding:16px;border:1px solid rgba(255,255,255,.1)}
.season-card.summer{background:linear-gradient(135deg,rgba(251,191,36,.15),rgba(239,68,68,.1))}
.season-card.autumn{background:linear-gradient(135deg,rgba(249,115,22,.15),rgba(234,179,8,.1))}
.season-card.winter{background:linear-gradient(135deg,rgba(59,130,246,.15),rgba(147,197,253,.1))}
.season-card.spring{background:linear-gradient(135deg,rgba(34,197,94,.15),rgba(236,72,153,.1))}
.season-card h3{font-size:.95rem;margin-bottom:8px}
.season-card .temps{font-size:.85rem;margin-bottom:6px}
.season-card .activities{font-size:.75rem;color:#cbd5e1;line-height:1.7}
.daily-vibe{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;text-align:center}
.vibe-item{background:rgba(255,255,255,.05);border-radius:10px;padding:10px 6px;border:1px solid rgba(255,255,255,.06)}
.vibe-item .num{font-size:1.3rem;font-weight:800}
.vibe-item .desc{font-size:.6rem;color:#94a3b8;margin-top:2px}
.compare{background:rgba(255,255,255,.04);border-radius:14px;padding:16px;border:1px solid rgba(255,255,255,.08)}
.compare table{width:100%;border-collapse:collapse;font-size:.78rem}
.compare th{text-align:left;padding:6px 8px;color:#64748b;font-size:.65rem;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.08)}
.compare td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04)}
.compare .winner{color:#22c55e;font-weight:700}
.chart-box{background:rgba(255,255,255,.04);border-radius:14px;padding:14px;border:1px solid rgba(255,255,255,.08)}
.chart-box canvas{height:180px!important}
.monthly{display:grid;grid-template-columns:repeat(auto-fill,minmax(65px,1fr));gap:6px}
.mo-card{background:rgba(255,255,255,.05);border-radius:10px;padding:8px 4px;text-align:center;font-size:.65rem;border:1px solid rgba(255,255,255,.06)}
.mo-card .month{font-weight:700;font-size:.75rem;margin-bottom:3px}
.mo-card .hot{color:#ef4444;font-weight:700}
.mo-card .cold{color:#60a5fa}
.mo-card .rain{color:#06b6d4}
.mo-card .sun{color:#fbbf24}
.truth{background:rgba(239,68,68,.06);border-radius:14px;padding:16px;border:1px solid rgba(239,68,68,.15)}
.truth h3{color:#fca5a5;margin-bottom:8px}
.truth ul{font-size:.78rem;line-height:2;padding-left:16px;color:#cbd5e1}
.nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.nav a{color:#60a5fa;font-size:.8rem;text-decoration:none}
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.wtab{padding:8px 14px;background:rgba(255,255,255,.06);border-radius:8px;font-size:.75rem;cursor:pointer;border:1px solid rgba(255,255,255,.08);color:#94a3b8;transition:.15s}
.wtab:hover{background:rgba(255,255,255,.1)}
.wtab.active{background:rgba(59,130,246,.2);color:#60a5fa;border-color:rgba(59,130,246,.3)}
.wpanel{display:none}.wpanel.active{display:block}
.source{font-size:.6rem;color:#475569;text-align:center;margin-top:24px;line-height:1.6}
@media(max-width:600px){.hero{grid-template-columns:repeat(3,1fr)}.seasons{grid-template-columns:1fr}h1{font-size:1.3rem}}
</style>
</head>
<body>
<div class="container">
<div class="nav"><a href="index.html">← Back to Tracker</a><span style="font-size:.7rem;color:#475569">365 days real data</span></div>
<h1>☀️ Melbourne Weather</h1>
<p class="tagline">Real data, full year — here's what life actually looks like</p>
<div class="hero" id="heroStats"></div>
<div class="tabs">
<div class="wtab active" onclick="showWTab('family',this)">👨‍👩‍👧‍👦 Family View</div>
<div class="wtab" onclick="showWTab('months',this)">📅 Monthly</div>
<div class="wtab" onclick="showWTab('charts',this)">📊 Charts</div>
<div class="wtab" onclick="showWTab('honest',this)">🤝 The Honest Bit</div>
</div>
<div class="wpanel active" id="family"></div>
<div class="wpanel" id="months"></div>
<div class="wpanel" id="charts"></div>
<div class="wpanel" id="honest"></div>
<p class="source">Data: BOM Melbourne Olympic Park (086338) + Open-Meteo | Jun 2025 – May 2026 | All actual observations, not averages</p>
</div>
<script src="weather_data.json.js"></script>
<script src="weather_app.js"></script>
</body>
</html>
